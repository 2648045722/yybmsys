<script>
let currentPage = 1;
const totalPages = 5;

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.product-page').forEach(el => el.classList.remove('active'));
  document.getElementById(`page${page}`).classList.add('active');
  
  // 标签高亮
  document.querySelectorAll('.product-tabs a').forEach(a => a.classList.remove('active'));
  document.querySelector(`.product-tabs a[data-target="${page}"]`).classList.add('active');
}

// 标签点击切换
document.querySelectorAll('.product-tabs a').forEach(a => {
  a.onclick = () => {
    const page = a.dataset.target;
    showPage(page);
  };
});

// 分页按钮
document.getElementById('prev').onclick = () => {
  if (currentPage > 1) showPage(Number(currentPage) - 1);
};
document.getElementById('next').onclick = () => {
  if (currentPage < totalPages) showPage(Number(currentPage) + 1);
};
document.querySelectorAll('.page-btn').forEach(btn => {
  btn.onclick = () => showPage(Number(btn.dataset.page));
});

showPage(1);
</script>
