<script>
let currentPage = 1;
const totalPages = 3;

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.product-page').forEach(el => el.classList.remove('active'));
  document.getElementById(`page${page}`).classList.add('active');
  document.querySelectorAll('.page-btn').forEach(el => el.classList.remove('current'));
  document.querySelector(`.page-btn[data-page="${page}"]`).classList.add('current');
  document.getElementById('prev').disabled = page === 1;
  document.getElementById('next').disabled = page === totalPages;
}

document.getElementById('prev').onclick = () => {
  if (currentPage > 1) showPage(currentPage - 1);
};
document.getElementById('next').onclick = () => {
  if (currentPage < totalPages) showPage(currentPage + 1);
};
document.querySelectorAll('.page-btn').forEach(btn => {
  btn.onclick = () => showPage(Number(btn.dataset.page));
});
showPage(1);
</script>
